name: Update Windows Update Policy

on:
  schedule:
    # Runs at 00:00 UTC every Wednesday
    - cron: '0 0 * * 3'
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write

jobs:
  update-policy:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Update-WindowsUpdatePolicy
        shell: pwsh
        run: |
          ./Update-WindowsUpdatePolicy.ps1 -UpdateChangelog -SkipEoL:$false

      - name: Commit and Push Changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Windows-UpdatePolicy.json CHANGELOG.POLICY.md
          $changes = git status --porcelain Windows-UpdatePolicy.json CHANGELOG.POLICY.md
          if ($changes) {
              git commit -m "chore: update Windows Update Policy and Changelog"
              git push
          } else {
              Write-Host "No changes detected."
          }
